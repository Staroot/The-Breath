<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxation Breathing</title>
    <meta name="description" content="Helping Relaxation Breathing for Stress, Anxiety and Panic">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-screen">
        <h1>지금 어떤 상태이신가요?</h1>
        <div class="button-container">
            <button class="breath-button" data-mode="anxiety">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#5c6bc0">
                    <path d="M120-120v-80h240q17 0 28.5-11.5T400-240q0-17-11.5-28.5T360-280H80v-80h280q50 0 85 35t35 85q0 50-35 85t-85 35H120Zm160-200v-80h320q50 0 85-35t35-85q0-50-35-85t-85-35H160v-80h440q83 0 141.5 58.5T800-480q0 83-58.5 141.5T600-280H280Zm0-320v-80h160q17 0 28.5 11.5T480-560q0 17-11.5 28.5T440-520H280Z"/>
                </svg>
                <span>Anxiety</span>
            </button>
            
            <button class="breath-button" data-mode="stress">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#5c6bc0">
                    <path d="M480-120q-116 0-198-80.5T200-397q0-54 22.5-103.5T284-586l196-224 196 224q39 37 61.5 86.5T760-397q0 116-82 196.5T480-120Zm0-80q83 0 141.5-58T680-397q0-35-16.5-70.5T626-524L480-690 334-524q-21 21-37.5 56.5T280-397q0 81 58.5 139T480-200Zm0-290Z"/>
                </svg>
                <span>Stress</span>
            </button>
            
            <button class="breath-button" data-mode="insomnia">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#5c6bc0">
                    <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/>
                </svg>
                <span>Insomnia</span>
            </button>
        </div>
    </div>

    <div id="breath-screen">
        <div class="box-track" id="track-container">
            <div class="dot" id="breathing-dot"></div>
            <div id="instruction-text">준비</div>
        </div>
        <button id="btn-back">뒤로 가기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
