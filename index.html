<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxation Breathing</title>
    <meta name="description" content="Helping Relaxation Breathing for Stress, Anxiety and Panic">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-screen">
        <h1>지금 어떤 상태이신가요?</h1>
        <div class="button-container">
            <button class="breath-button" id="btn-stress">
                <svg xmlns="http://www.w3.org/2000/svg" height="50" viewBox="0 -960 960 960" width="50" fill="#5c6bc0" style="margin-bottom: 12px;">
                    <path d="M480-120q-116 0-198-80.5T200-397q0-54 22.5-103.5T284-586l196-224 196 224q39 37 61.5 86.5T760-397q0 116-82 196.5T480-120Z"/>
                </svg>
                <span>Stress</span>
            </button>
        </div>
    </div>

    <div id="breath-screen">
        <div class="box-track">
            <div class="dot" id="breathing-dot"></div>
            <div id="instruction-text">준비</div>
        </div>
        <button id="btn-back">뒤로 가기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
