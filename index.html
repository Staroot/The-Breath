<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxation Breathing</title>
    <meta name="description" content="Helping Relaxation Breathing for Stress, Anxiety and Panic">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f7; /* 눈이 편안한 옅은 회색 배경 */
            font-family: sans-serif;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-weight: normal;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        /* 버튼 기본 디자인 */
        .breath-button {
            background-color: white;
            border: none;
            border-radius: 24px; /* 둥근 모서리 */
            padding: 30px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* 부드러운 그림자 */
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease; /* 애니메이션 속도 */
        }

        /* 마우스를 올렸을 때 살짝 위로 떠오르는 효과 */
        .breath-button:hover {
            transform: translateY(-5px);
        }

        /* 픽토그램 디자인 */
        .breath-button .material-symbols-rounded {
            font-size: 50px;
            color: #5c6bc0; /* 차분한 보라-파랑 계열 */
            margin-bottom: 12px;
        }

        /* 버튼 텍스트 디자인 */
        .breath-button span:last-child {
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>지금 어떤 상태이신가요?</h1>
    
    <div class="button-container">
        <button class="breath-button" id="btn-stress">
            <span class="material-symbols-rounded">water_drop</span>
            <span>Stress</span>
        </button>
    </div>
</body>
</html>
